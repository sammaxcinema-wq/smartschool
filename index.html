<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primary and Secondary Curriculum Classes Management</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Curriculum Classes Management System</h1>
    </header>
    <main>
        <section>
            <h2>Add Class</h2>
            <form id="classForm">
                <input type="text" id="className" placeholder="Class Name" required>
                <select id="stream">
                    <option value="West">West</option>
                    <option value="East">East</option>
                    <option value="North">North</option>
                    <option value="South">South</option>
                </select>
                <button type="submit">Add Class</button>
            </form>
        </section>
        <section>
            <h2>Classes List</h2>
            <ul id="classesList"></ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 SmartSchool</p>
    </footer>
</body>
</html>
